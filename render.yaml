services:
  - type: web
    name: blog-ib
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_BASE_URL
        value: ""
      - key: DATABASE_URL
        fromDatabase:
          name: blog-ib-db
          property: connectionString

databases:
  - name: blog-ib-db
    plan: free
    databaseName: blogib
    user: blogib
