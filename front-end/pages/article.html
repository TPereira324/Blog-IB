<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article — The Journal.</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

  <div style="display: flex; flex-direction: column; min-height: 100vh;">

    <nav>
      <a class="logo" href="index.html">The Journal<span>.</span></a>
      <ul class="nav-links">
        <li><a href="articles.html">Articles</a></li>
        <li id="nav-admin"></li>
      </ul>
    </nav>

    <div class="article-page">
      <a class="back-link" href="articles.html">← Back to essays</a>
      <p class="article-page-kicker" id="read-tag"></p>
      <h1 id="read-title">Loading…</h1>
      <div class="article-page-meta">
        <span id="read-date"></span>
        <span id="read-time"></span>
      </div>
      <div class="article-body" id="read-body"></div>
    </div>

    <footer>
      <p>The Journal — published with care.</p>
      <span>© 2026</span>
    </footer>

  </div>

  <script src="../js/app.js"></script>
  <script>
    // Admin nav link
    const navAdmin = document.getElementById('nav-admin');
    if (isAdmin()) {
      navAdmin.innerHTML = '<a href="admin-write.html">Write</a>';
    } else {
      navAdmin.innerHTML = '<a href="admin-login.html">Write</a>';
    }

    // Load article
    const params = new URLSearchParams(window.location.search);
    const index = parseInt(params.get('id'), 10);
    const articles = getArticles();
    const art = articles[index];

    if (!art) {
      document.getElementById('read-title').textContent = 'Article not found.';
    } else {
      document.title = `${art.title} — The Journal.`;
      document.getElementById('read-tag').textContent = art.tag || '';
      document.getElementById('read-title').textContent = art.title;
      document.getElementById('read-date').textContent = formatDate(art.date);
      document.getElementById('read-time').textContent = readTime(art.body);

      document.getElementById('read-body').innerHTML = art.body
        .split('\n\n')
        .map(para =>
          para.startsWith('"') || para.startsWith('\u201c')
            ? `<blockquote>${para}</blockquote>`
            : `<p>${para}</p>`
        )
        .join('');
    }
  </script>

</body>

</html>
