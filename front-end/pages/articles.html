<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles — The Journal.</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

    <div style="display: flex; flex-direction: column; min-height: 100vh;">

        <nav>
            <a class="logo" href="index.html">The Journal<span>.</span></a>
            <ul class="nav-links">
                <li><a href="articles.html">Articles</a></li>
                <li id="nav-admin"></li>
            </ul>
        </nav>

        <div class="page-header" style="padding-bottom: 2rem;">
            <h1>All essays</h1>
        </div>

        <hr class="divider">

        <section class="essays-section">
            <div class="essays-header">
                <h2>Published pieces</h2>
                <span class="essays-count" id="articles-count">0 pieces</span>
            </div>
            <div id="articles-list">
                <div class="empty-state">
                    <p>The press is warming up.</p>
                    <p>No articles published yet — check back soon.</p>
                </div>
            </div>
        </section>

        <div style="flex: 1;"></div>

        <footer>
            <p>The Journal — published with care.</p>
            <span>© 2026</span>
        </footer>

    </div>

    <script src="../js/app.js"></script>
    <script>
        // Admin nav link
        const navAdmin = document.getElementById('nav-admin');
        if (isAdmin()) {
            navAdmin.innerHTML = '<a href="admin-write.html">Write</a>';
        } else {
            navAdmin.innerHTML = '<a href="admin-login.html">Write</a>';
        }

        // Render articles
        const articles = getArticles();
        const countEl = document.getElementById('articles-count');
        const listEl = document.getElementById('articles-list');

        countEl.textContent = articles.length === 1 ? '1 piece' : `${articles.length} pieces`;
        if (articles.length > 0) {
            listEl.innerHTML = articles.map((a, i) => articleCardHTML(a, i)).join('');
        }
    </script>

</body>

</html>
