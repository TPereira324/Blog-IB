<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles — The Journal.</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

    <div style="display: flex; flex-direction: column; min-height: 100vh;">

        <nav>
            <a class="logo" href="../index.html">The Journal<span>.</span></a>
            <ul class="nav-links">
                <li><a href="articles.html">Articles</a></li>
                <li id="nav-write"></li>
            </ul>
        </nav>

        <div class="page-header" style="padding-bottom: 2rem;">
            <h1>All essays</h1>
        </div>

        <hr class="divider">

        <section class="essays-section">
            <div class="essays-header">
                <h2>Published pieces</h2>
                <span class="essays-count" id="articles-count"></span>
            </div>
            <div id="articles-list">
                <div class="loading-state"><p>A carregar…</p></div>
            </div>
        </section>

        <div style="flex: 1;"></div>

        <footer>
            <p>The Journal — published with care.</p>
            <span>© 2026</span>
        </footer>

    </div>

    <script src="../js/app.js"></script>
    <script>
        // Nav write link
        const navWrite = document.getElementById('nav-write');
        if (isAdmin()) {
            navWrite.innerHTML = '<a href="admin-write.html">Write</a>';
        } else {
            navWrite.innerHTML = '<a href="admin-login.html">Write</a>';
        }

        const countEl = document.getElementById('articles-count');
        const listEl  = document.getElementById('articles-list');

        const emptyHTML = `<div class="empty-state">
            <p>The press is warming up.</p>
            <p>No articles published yet — check back soon.</p>
        </div>`;

        function renderArticles(articles, isApi) {
            countEl.textContent = articles.length === 1 ? '1 piece' : `${articles.length} pieces`;
            if (articles.length === 0) { listEl.innerHTML = emptyHTML; return; }
            listEl.innerHTML = articles.map((a, i) => articleCardHTML(a, i)).join('');
        }

        apiGetArticles()
            .then(articles => renderArticles(articles, true))
            .catch(() => renderArticles(getArticles(), false));
    </script>

</body>

</html>
